<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register page</title>
</head>
<body>
     <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav>
    <h1>Register to Student Management System</h1>
    <form>
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter Username" name="username" required><br><br>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter Email" name="email" required><br><br>
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter Password" name="password" required><br><br>
        <button type="submit">Register</button>
    </form>
    <h4>Already have an account? </h4>
    <a href="login.html">Login here</a>
</body>
</html>
