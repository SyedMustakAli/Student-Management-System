<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Students</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="viewStudent.html">View Students</a>
        <a href="addStudent.html">Add Student</a>
        <a href="logout.html">Logout</a>
    </nav>
    <h1>Add Student</h1>
    <form action="addStudent.html" method="post">
        <label for="id">ID:</label>
        <input type="text" id="id" name="id" required><br><br>
        <label for="name">Name:</label> 
        <input type="text" id="name" name="name" required><br><br>
        <label for="rollnumber">Roll Number:</label>
        <input type="text" id="rollnumber" name="rollnumber" required><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        <label for="branch">Branch:</label>
        <input type="text" id="branch" name="branch" required><br><br>
        <label for="cgpa">CGPA:</label>
        <input type="text" id="cgpa" name="cgpa" required><br><br>
        <button type="submit">Add Student</button>
         
    </form>
    

    
</body>
</html>
